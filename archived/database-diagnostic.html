<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVICO-PRO - Diagnostic Base de Données</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .diagnostic-results {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .diagnostic-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            border-left: 4px solid;
        }
        
        .diagnostic-item.success {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }
        
        .diagnostic-item.error {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }
        
        .diagnostic-item.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
            color: #856404;
        }
        
        .diagnostic-item.info {
            background: #d1ecf1;
            border-left-color: #17a2b8;
            color: #0c5460;
        }
        
        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .status-card h3 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .status-card p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .firebase-info {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        .firebase-info code {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 AVICO-PRO</h1>
            <p>Diagnostic Complet de la Base de Données</p>
        </div>
        
        <div class="content">
            <div class="firebase-info">
                <strong>🔥 Configuration Firebase:</strong><br>
                Projet: <code>samci-avicole</code><br>
                Database: <code>Firestore</code><br>
                Auth: <code>Firebase Auth</code>
            </div>
            
            <div class="status-cards">
                <div class="status-card">
                    <h3 id="success-count">0</h3>
                    <p>✅ Succès</p>
                </div>
                <div class="status-card">
                    <h3 id="error-count">0</h3>
                    <p>❌ Erreurs</p>
                </div>
                <div class="status-card">
                    <h3 id="warning-count">0</h3>
                    <p>⚠️ Avertissements</p>
                </div>
                <div class="status-card">
                    <h3 id="total-count">0</h3>
                    <p>📊 Total Tests</p>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" onclick="runDiagnostic()">
                    🔍 Lancer Diagnostic Complet
                </button>
                <button class="btn btn-success" onclick="repairDatabase()">
                    🔔 Réparer Problèmes
                </button>
                <button class="btn btn-warning" onclick="clearResults()">
                    🗑️ Effacer Résultats
                </button>
                <button class="btn btn-primary" onclick="testConnection()">
                    🌐 Test Connexion Simple
                </button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Diagnostic en cours...</p>
            </div>
            
            <div class="diagnostic-results" id="diagnostic-results">
                <div class="diagnostic-item info">
                    <strong>[INFO]</strong> Prêt à lancer le diagnostic de la base de données...
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
    
    <script src="database-diagnostic.js"></script>
    
    <script>
        function updateCounts() {
            const items = document.querySelectorAll('.diagnostic-item');
            const counts = {
                success: 0,
                error: 0,
                warning: 0,
                total: items.length
            };
            
            items.forEach(item => {
                if (item.classList.contains('success')) counts.success++;
                else if (item.classList.contains('error')) counts.error++;
                else if (item.classList.contains('warning')) counts.warning++;
            });
            
            document.getElementById('success-count').textContent = counts.success;
            document.getElementById('error-count').textContent = counts.error;
            document.getElementById('warning-count').textContent = counts.warning;
            document.getElementById('total-count').textContent = counts.total;
        }
        
        function showLoading(show = true) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        async function runDiagnostic() {
            showLoading(true);
            clearResults();
            
            try {
                await window.runDatabaseDiagnostic();
            } catch (error) {
                console.error('Erreur diagnostic:', error);
            } finally {
                showLoading(false);
                updateCounts();
            }
        }
        
        async function repairDatabase() {
            showLoading(true);
            
            try {
                await window.repairDatabase();
            } catch (error) {
                console.error('Erreur réparation:', error);
            } finally {
                showLoading(false);
                updateCounts();
            }
        }
        
        function clearResults() {
            document.getElementById('diagnostic-results').innerHTML = '';
            updateCounts();
        }
        
        async function testConnection() {
            const diagnostic = new DatabaseDiagnostic();
            await diagnostic.testNetworkConnection();
            await diagnostic.testFirebaseInitialization();
            updateCounts();
        }
        
        // Surcharge de la méthode displayResult pour mettre à jour les compteurs
        const originalLog = DatabaseDiagnostic.prototype.log;
        DatabaseDiagnostic.prototype.log = function(message, type = 'info', data = null) {
            originalLog.call(this, message, type, data);
            
            // Mettre à jour les compteurs après un court délai
            setTimeout(updateCounts, 100);
        };
        
        // Message initial
        console.log('🔍 Page de diagnostic AVICO-PRO chargée');
    </script>
</body>
</html>
