name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install
        
    - name: Build demo
      run: |
        # Créer le dossier de build
        mkdir -p build
        
        # Copier les fichiers principaux
        cp index.html build/
        cp style.css build/
        cp -r js build/
        cp -r docs build/
        cp manifest.json build/
        cp notifications.js build/
        cp mobile-app.js build/
        
        # Copier les assets si nécessaire
        if [ -d "assets" ]; then
          cp -r assets build/
        fi
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        destination_dir: demo
