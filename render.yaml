version: "1"
build:
  os: "ubuntu-22.04"
  tools:
    node: "18"
services:
  - type: "web"
    name: "avico-pro"
    env: "static"
    buildCommand: "echo 'Static site - no build needed'"
    staticPublishPath: "."
    routes:
      - type: "rewrite"
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: "NODE_VERSION"
        value: "18"
